# Layer 4: checks.yaml
# 职责：QA 每次活动测试使用的业务脚本。
# 维护者：QA。常见场景只需要指定活动 ID + preset。
version: "1.1"

target:
  table: activity
  key: activity_id
  value: summer_night_2024
  name: "一夏夜梦谭"

preset: activity_full_check

params:
  currency_id: NIGHT_JADE
  currency_name: "夜之玉"
  weekly_limit: 120
  expected_reset_weekday: Monday
  activity_weeks: 2
  require_redpoint: true

# 可选：临时补充规则。普通 QA 不需要写。
# extra_checks 会在 preset 展开后追加执行。
extra_checks:
  - rule: value_equals_param
    group: consistency
    with:
      table: currency
      field: reset_weekday
      param: expected_reset_weekday
    severity: WARN
    message: "夜之玉重置星期应符合 checklist：周一刷新"

# 可选：特殊活动跳过个别规则。默认不用。
# skip 在 schema 默认校验、preset、extra_checks 合并后生效。
skip: []

output:
  format: markdown
  path: reports/summer_night_2024.md
  path_base: cwd
  include_passed: false
